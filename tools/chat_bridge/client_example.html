<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustyCore Chat Bridge</title>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: rgba(18, 17, 16, 0.9);
            --border-gold: #c79c6e;
            --border-dark: #3b2c1b;
            --text-main: #f8e5c6;
            --text-muted: #8e806c;
            --btn-bg: #4a0d0d;
            --btn-hover: #7b1010;

            --chat-say: #ffffff;
            --chat-yell: #ff4040;
            --chat-guild: #40ff40;
            --chat-party: #aaaafe;
            --chat-raid: #ff7f00;
            --chat-whisper: #ff80ff;
            --chat-system: #ffff00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('[wow.zamimg.com](https://wow.zamimg.com/uploads/guide/images/18318.jpg)') center/cover no-repeat fixed;
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        h1, h2, h3 {
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px #000;
        }

        .rustycore-app {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: var(--panel-bg);
            border: 2px solid var(--border-dark);
            border-radius: 4px;
            padding: 20px;
            box-shadow: inset 0 0 15px #000, 0 4px 10px rgba(0,0,0,0.8);
            position: relative;
            transition: border-color 0.3s;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 1px solid var(--border-gold);
            pointer-events: none;
            opacity: 0.5;
            border-radius: 4px;
        }

        .panel header {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 10px;
        }

        .panel header h2 {
            color: var(--border-gold);
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--border-gold);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-dark);
            color: var(--text-main);
            padding: 10px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--border-gold);
            box-shadow: 0 0 5px var(--border-gold);
        }

        button {
            width: 100%;
            background: linear-gradient(to bottom, var(--btn-bg), #2a0505);
            border: 1px solid var(--border-gold);
            color: #fff;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: inset 0 0 5px #000;
            transition: all 0.2s;
        }

        button:hover {
            background: linear-gradient(to bottom, var(--btn-hover), var(--btn-bg));
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: 2px solid var(--border-dark);
            box-shadow: inset 0 0 30px #000;
            border-radius: 4px;
            position: relative;
        }

        .chat-header {
            padding: 15px;
            background: linear-gradient(rgba(0,0,0,0.8), transparent);
            border-bottom: 1px solid var(--border-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            color: var(--border-gold);
        }

        .status {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 3px;
            background: rgba(0,0,0,0.5);
        }

        .status.offline {
            color: var(--chat-yell);
            border: 1px solid var(--chat-yell);
        }

        .status.online {
            color: var(--chat-guild);
            border: 1px solid var(--chat-guild);
        }

        .chat-log {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.5;
            text-shadow: 1px 1px 0px #000;
        }

        .chat-log::-webkit-scrollbar {
            width: 8px;
        }

        .chat-log::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
        }

        .chat-log::-webkit-scrollbar-thumb {
            background: var(--border-dark);
            border: 1px solid var(--border-gold);
        }

        .chat-controls {
            display: flex;
            padding: 15px;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid var(--border-dark);
            align-items: center;
        }

        .chat-controls select {
            width: 170px;
        }

        .chat-controls input {
            flex: 1;
        }

        .chat-controls button {
            width: auto;
            padding: 0 30px;
            height: 42px;
        }

        .msg {
            margin-bottom: 4px;
            word-wrap: break-word;
        }

        .msg .time {
            color: #666;
            font-size: 0.8em;
            margin-right: 5px;
        }

        .msg .author {
            cursor: pointer;
        }

        .msg.say { color: var(--chat-say); }
        .msg.yell { color: var(--chat-yell); font-size: 1.1em; }
        .msg.guild { color: var(--chat-guild); }
        .msg.party { color: var(--chat-party); }
        .msg.raid { color: var(--chat-raid); }
        .msg.whisper { color: var(--chat-whisper); }
        .msg.system { color: var(--chat-system); font-style: italic; }

        .hidden {
            display: none !important;
        }

        #character-info {
            text-align: center;
            color: var(--chat-system);
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .small-note {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }

        .row-buttons {
            display: flex;
            gap: 10px;
        }

        .row-buttons button {
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="rustycore-app">
        <aside class="sidebar">
            <div id="panel-login" class="panel">
                <header><h2>Portal del Reino</h2></header>

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Tu cuenta...">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña...">
                </div>

                <button id="btn-login">Ingresar</button>

                <div id="login-error" class="hidden" style="color: var(--chat-yell); margin-top: 10px; font-size: 0.85rem; text-align: center;">
                    Error de conexión.
                </div>
            </div>

            <div id="panel-session" class="panel hidden">
                <header><h2>General</h2></header>

                <div class="form-group">
                    <label for="character-select">Mis personajes</label>
                    <select id="character-select">
                        <option value="">Cargando...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="manual-char-name">Nombre manual del personaje</label>
                    <input type="text" id="manual-char-name" placeholder="Solo si no carga la lista">
                </div>

                <div id="character-info">Personaje: (Ninguno)</div>
                <div class="small-note" id="character-debug"></div>

                <button id="btn-connect-ws" style="margin-top:20px;">Conectar Interfaz</button>
            </div>

            <div id="panel-channels" class="panel hidden">
                <header><h2>Sintonizar Canal</h2></header>

                <div class="form-group">
                    <input type="text" id="subscribe-channel" placeholder="Ej: chat:in:guild:1" style="margin-bottom:10px;">
                    <div class="row-buttons">
                        <button id="btn-subscribe">Suscribir</button>
                        <button id="btn-unsubscribe" style="background: #333;">Anular</button>
                    </div>
                </div>
            </div>

            <div id="panel-whisper" class="panel hidden">
                <header><h2>Susurros</h2></header>

                <div class="form-group">
                    <label for="whisper-search">Buscar personaje online</label>
                    <input type="text" id="whisper-search" placeholder="Escribe para filtrar...">
                </div>

                <div class="form-group">
                    <label for="whisper-target">Destino whisper</label>
                    <select id="whisper-target">
                        <option value="">Selecciona un personaje</option>
                    </select>
                </div>
            </div>
        </aside>

        <main class="chat-container">
            <div class="chat-header">
                <h1>RustyCore Comms</h1>
                <span id="socket-status" class="status offline">Desconectado</span>
            </div>

            <div id="chat-log" class="chat-log">
                <div class="msg system">[Sistema]: Bienvenido a RustyCore Web Bridge. Por favor, identifícate.</div>
            </div>

            <div class="chat-controls">
                <select id="chat-type">
                    <option value="say">Decir (/s)</option>
                    <option value="yell">Gritar (/y)</option>
                    <option value="guild">Hermandad (/g)</option>
                    <option value="party">Grupo (/p)</option>
                    <option value="raid">Banda (/ra)</option>
                    <option value="whisper">Susurro (/w)</option>
                </select>

                <input type="text" id="chat-input" placeholder="Escribe tu mensaje..." disabled>
                <button id="btn-send" disabled>Enviar</button>
            </div>
        </main>
    </div>

    <script>
        let token = null;
        let socket = null;
        let activeCharGuid = '';
        let activeCharName = '';
        let myChars = [];
        let onlineChars = [];

        const elLog = document.getElementById('chat-log');
        const elChatInput = document.getElementById('chat-input');
        const elBtnSend = document.getElementById('btn-send');
        const elChatType = document.getElementById('chat-type');
        const statusBadge = document.getElementById('socket-status');

        const elPanelLogin = document.getElementById('panel-login');
        const elPanelSession = document.getElementById('panel-session');
        const elPanelChannels = document.getElementById('panel-channels');
        const elPanelWhisper = document.getElementById('panel-whisper');

        const elLoginError = document.getElementById('login-error');
        const elCharacterSelect = document.getElementById('character-select');
        const elManualCharName = document.getElementById('manual-char-name');
        const elCharacterInfo = document.getElementById('character-info');
        const elCharacterDebug = document.getElementById('character-debug');

        const elWhisperSearch = document.getElementById('whisper-search');
        const elWhisperTarget = document.getElementById('whisper-target');

        function logMessage(text, type = 'system', author = 'Sistema') {
            const div = document.createElement('div');
            div.className = `msg ${type}`;

            const time = new Date().toLocaleTimeString('es-ES', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit'
            });

            let htmlInner = `<span class="time">[${time}]</span> `;

            if (type === 'system') {
                htmlInner += `<span>${escapeHtml(text)}</span>`;
            } else {
                let channelPrefix = '';
                if (type === 'guild') channelPrefix = '[Hermandad] ';
                if (type === 'party') channelPrefix = '[Grupo] ';
                if (type === 'raid') channelPrefix = '[Banda] ';
                if (type === 'whisper') channelPrefix = '[Susurro] ';

                htmlInner += `<span>${channelPrefix}</span><span class="author">[${escapeHtml(author)}]</span>: <span>${escapeHtml(text)}</span>`;
            }

            div.innerHTML = htmlInner;
            elLog.appendChild(div);
            elLog.scrollTop = elLog.scrollHeight;
        }

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function updateCharacterInfo() {
            const shownName = activeCharName || '(Ninguno)';
            elCharacterInfo.textContent = `Personaje: ${shownName}`;
        }

        function renderMyCharacters(chars, debugAccountId) {
            myChars = Array.isArray(chars) ? chars : [];
            elCharacterSelect.innerHTML = '';

            if (!myChars.length) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = 'No se encontraron personajes';
                elCharacterSelect.appendChild(opt);

                activeCharGuid = '';
                activeCharName = '';
                updateCharacterInfo();
                elCharacterDebug.textContent = `accountId detectado: ${debugAccountId ?? '?'}`;
                return;
            }

            const firstEmpty = document.createElement('option');
            firstEmpty.value = '';
            firstEmpty.textContent = 'Selecciona un personaje';
            elCharacterSelect.appendChild(firstEmpty);

            for (const ch of myChars) {
                const opt = document.createElement('option');
                opt.value = String(ch.guid);
                opt.textContent = `${ch.name} (${ch.guid})`;
                opt.dataset.name = ch.name || '';
                elCharacterSelect.appendChild(opt);
            }

            if (myChars.length > 0) {
                activeCharGuid = String(myChars[0].guid);
                activeCharName = String(myChars[0].name || '');
                elCharacterSelect.value = activeCharGuid;
            }

            updateCharacterInfo();
            elCharacterDebug.textContent = `accountId detectado: ${debugAccountId ?? '?'}`;
        }

        async function loadMyCharacters() {
            const res = await fetch('/chars', {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || 'No se pudieron cargar los personajes');
            }

            renderMyCharacters(data.chars || [], data.debugAccountId);

            if ((data.chars || []).length > 0) {
                logMessage(`Se cargaron ${data.chars.length} personaje(s).`, 'system');
            } else {
                logMessage(`No se encontraron personajes para accountId=${data.debugAccountId ?? '?'}.`, 'system');
            }
        }

        function renderOnlineCharacters(list) {
            const chars = Array.isArray(list) ? list : [];
            elWhisperTarget.innerHTML = '';

            const empty = document.createElement('option');
            empty.value = '';
            empty.textContent = chars.length ? 'Selecciona un personaje' : 'No hay personajes online';
            elWhisperTarget.appendChild(empty);

            for (const ch of chars) {
                const opt = document.createElement('option');
                opt.value = ch.name;
                opt.textContent = `${ch.name} (${ch.guid})`;
                opt.dataset.guid = ch.guid;
                elWhisperTarget.appendChild(opt);
            }
        }

        async function loadOnlineCharacters() {
            const res = await fetch('/online-chars', {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || 'No se pudieron cargar los personajes online');
            }

            onlineChars = Array.isArray(data.chars) ? data.chars : [];
            renderOnlineCharacters(onlineChars);
        }

        function filterOnlineCharacters() {
            const q = elWhisperSearch.value.trim().toLowerCase();

            if (!q) {
                renderOnlineCharacters(onlineChars);
                return;
            }

            const filtered = onlineChars.filter((ch) =>
                String(ch.name || '').toLowerCase().includes(q)
            );

            renderOnlineCharacters(filtered);
        }

        function getSelectedCharacter() {
            const selectedGuid = String(elCharacterSelect.value || '').trim();

            if (selectedGuid) {
                const found = myChars.find((c) => String(c.guid) === selectedGuid);
                return {
                    charGuid: selectedGuid,
                    charName: found ? String(found.name || '') : ''
                };
            }

            const manualName = String(elManualCharName.value || '').trim();
            if (manualName) {
                return {
                    charGuid: '',
                    charName: manualName
                };
            }

            return {
                charGuid: '',
                charName: ''
            };
        }

        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();

                if (!res.ok || !data.token) {
                    elLoginError.textContent = 'Credenciales inválidas.';
                    elLoginError.classList.remove('hidden');
                    return;
                }

                token = data.token;
                elLoginError.classList.add('hidden');

                elPanelLogin.classList.add('hidden');
                elPanelSession.classList.remove('hidden');
                elPanelChannels.classList.remove('hidden');
                elPanelWhisper.classList.remove('hidden');

                logMessage('Autenticado con éxito.', 'system');

                await loadMyCharacters();
                await loadOnlineCharacters();
            } catch (e) {
                elLoginError.textContent = 'Servidor inalcanzable.';
                elLoginError.classList.remove('hidden');
                logMessage(`Error de login: ${e.message}`, 'system');
            }
        }

        function connectSocket() {
            if (!token) return;

            socket = io({
                auth: { token }
            });

            socket.on('connect', () => {
                statusBadge.textContent = 'Conectado';
                statusBadge.classList.remove('offline');
                statusBadge.classList.add('online');
                elChatInput.disabled = false;
                elBtnSend.disabled = false;
                document.getElementById('btn-connect-ws').disabled = true;
                logMessage('Conexión arcana establecida. Escuchando...', 'system');
            });

            socket.on('disconnect', () => {
                statusBadge.textContent = 'Desconectado';
                statusBadge.classList.remove('online');
                statusBadge.classList.add('offline');
                elChatInput.disabled = true;
                elBtnSend.disabled = true;
                document.getElementById('btn-connect-ws').disabled = false;
                logMessage('Se ha perdido la conexión con el servidor.', 'system');
            });

            const seenMessages = new Set();

            socket.on('chat', (data) => {
                if (!data || !data.payload) return;

                const p = data.payload;
                const key =
                    String(p.fromAccount || '') + '|' +
                    String(p.message || '') + '|' +
                    String(p.type || '') + '|' +
                    String(data.channel || '');

                if (seenMessages.has(key)) return;
                seenMessages.add(key);

                setTimeout(() => {
                    seenMessages.delete(key);
                }, 2000);

                logMessage(
                    p.message || '',
                    p.type || 'say',
                    p.fromName || 'Desconocido'
                );
            });

            socket.on('sent', (res) => {
                if (!res.ok) {
                    logMessage(`Error al enviar mensaje: ${res.error}`, 'system');
                }
            });
        }

        function sendMessage() {
            if (!socket || !socket.connected) return;

            const text = elChatInput.value.trim();
            const type = elChatType.value;

            if (!text) return;

            const selectedCharacter = getSelectedCharacter();

            if (!selectedCharacter.charGuid && !selectedCharacter.charName) {
                logMessage('Debes seleccionar uno de tus personajes o escribir el nombre manual.', 'system');
                return;
            }

            const payload = {
                type,
                message: text,
                charGuid: selectedCharacter.charGuid,
                charName: selectedCharacter.charName,
                guildId: 1
            };

            if (type === 'whisper') {
                const target = String(elWhisperTarget.value || '').trim();
                if (!target) {
                    logMessage('Debes seleccionar un destinatario para el susurro.', 'system');
                    return;
                }

                payload.target = target;

                const selectedOnline = onlineChars.find((x) => x.name === target);
                if (selectedOnline) {
                    payload.targetGuid = String(selectedOnline.guid);
                }
            }

            socket.emit('send', payload);
            elChatInput.value = '';
        }

        document.getElementById('btn-login').addEventListener('click', doLogin);

        document.getElementById('btn-connect-ws').addEventListener('click', connectSocket);

        document.getElementById('btn-subscribe').addEventListener('click', () => {
            const chan = document.getElementById('subscribe-channel').value.trim();
            if (chan && socket) socket.emit('subscribe', chan);
        });

        document.getElementById('btn-unsubscribe').addEventListener('click', () => {
            const chan = document.getElementById('subscribe-channel').value.trim();
            if (chan && socket) socket.emit('unsubscribe', chan);
        });

        elBtnSend.addEventListener('click', sendMessage);

        elChatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        elCharacterSelect.addEventListener('change', () => {
            const selectedGuid = String(elCharacterSelect.value || '').trim();

            if (!selectedGuid) {
                activeCharGuid = '';
                activeCharName = '';
                updateCharacterInfo();
                return;
            }

            const found = myChars.find((c) => String(c.guid) === selectedGuid);
            activeCharGuid = selectedGuid;
            activeCharName = found ? String(found.name || '') : '';
            updateCharacterInfo();
        });

        elManualCharName.addEventListener('input', () => {
            if (!elCharacterSelect.value) {
                activeCharName = String(elManualCharName.value || '').trim();
                updateCharacterInfo();
            }
        });

        elWhisperSearch.addEventListener('input', filterOnlineCharacters);
    </script>
</body>
</html>
